name: 自动发版

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      
    - name: 设置Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: 安装依赖
      run: |
        echo "正在安装依赖..."
        npm ci
        
    - name: 运行测试
      run: |
        echo "运行测试..."
        npm test
        
    - name: 打包项目
      run: |
        echo "打包中..."
        npm run build
        echo "打包完成！"
        
    - name: 显示打包结果
      run: |
        echo "=== 打包文件列表 ==="
        ls -la dist/ || echo "没有dist目录"
        echo "=================="
        
    - name: 发送成功通知
      if: success()
      run: |
        echo "🎉 自动发版成功！"
        echo "分支: ${{ github.ref }}"
        echo "提交: ${{ github.sha }}"
        echo "触发者: ${{ github.actor }}"
        echo "运行编号: ${{ github.run_number }}"
        
    - name: 发送失败通知
      if: failure()
      run: |
        echo "❌ 自动发版失败！"
        echo "请检查错误日志"
        echo "提交: ${{ github.sha }}"
        echo "触发者: ${{ github.actor }}"